 # f the MQTT broker or Hass is restarted, or there is a WiFi outage, Tasmota device state may 
 # not be synced with Home Assistant. Use this automation to get all your (auto discovered) 
 # devices in sync, including power state, immediately after Home Assistant is (re)started.
 # https://github.com/arendst/Tasmota/wiki/Home-Assistant
  - alias: "Power state on HA start-up"
    trigger:
      platform: homeassistant
      event: start
    action:
      - service: mqtt.publish
        data:
          topic: "sonoffs/cmnd/state"
          payload: ""
 # test automation from : https://www.home-assistant.io/getting-started/automation/
  - alias: Check sensor value and show notification
    trigger:
      platform: numeric_state
      entity_id: sensor.random_sensor
      above: 10
    action:
      service: persistent_notification.create
      data:
        message: "Sensor value greater than 10"
  - id: login_failure
    alias: 'Login Failure'
    hide_entity: True
    trigger:
      platform: template
      value_template: "{{ states('persistent_notification.httplogin') != 'unknown' }}"
    action:
      service: notify.ios_your_iphone
      data:
        message: Warning - Failed login attempt detected.
  - alias: Hello World State
    # https://www.home-assistant.io/docs/automation/trigger/
    trigger:
      platform: mqtt
      # https://www.home-assistant.io/docs/automation/trigger/
      topic: HellowWorld
      # Optional
      # payload: 'on'
    action:
      service: persistent_notification.create
      data:
        message: "HellowWorld MQTT Trigger"
  - alias: HelloWorld Event
    trigger:
      platform: event
      event_type: HelloWorld
    action:
      service: persistent_notification.create
      data:
        message: "HellowWorld Event"

